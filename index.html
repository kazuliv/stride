  container.style.padding='0';container.style.overflow='hidden';container.style.display='flex';container.style.flexDirection='column';

  h+='<div class="calplan-divider" id="calplanDivider"></div>';

function buildCalplanTaskList(){
  const todayStr=today();
  const weekEnd=addDays(todayStr,7-new Date(todayStr+'T00:00:00').getDay());
  const nextWeekEnd=addDays(weekEnd,7);
  let all=getAllTasks().filter(t=>t.status!=='done');
  // Apply filter
  if(_calplanFilter==='unset') all=all.filter(t=>!t.actionDate);
  else if(_calplanFilter==='thisweek') all=all.filter(t=>t.actionDate&&t.actionDate>=todayStr&&t.actionDate<=weekEnd);
  else if(_calplanFilter==='nextweek') all=all.filter(t=>t.actionDate&&t.actionDate>weekEnd&&t.actionDate<=nextWeekEnd);

  const cals=state.gcalCalendars||[];
  const hasCals=cals.length>0;

  let h='<div class="calplan-toolbar">';
  h+='<div class="calplan-filter">';
  h+=calplanFilterBtn('all','すべて');
  h+=calplanFilterBtn('unset','未設定');
  h+=calplanFilterBtn('thisweek','今週');
  h+=calplanFilterBtn('nextweek','来週');
  h+='</div>';
  h+='<span style="font-size:11px;color:var(--text3);margin-left:auto">'+all.length+'件</span>';
  h+='</div>';

  // Group by company > project
  const groups={};
  for(const t of all){
    const key=t.companyId+'__'+t.projectId;
    if(!groups[key]) groups[key]={companyName:t.companyName,companyColor:t.companyColor,projectName:t.projectName,tasks:[]};
    groups[key].tasks.push(t);
  }
  if(!Object.keys(groups).length){
    h+='<div style="padding:32px;text-align:center;color:var(--text3);font-size:13px">該当するタスクはありません</div>';
    return h;
  }
  for(const key of Object.keys(groups)){
    const g=groups[key];
    h+='<div class="calplan-group">';
    h+='<div class="calplan-group-header"><span style="color:'+g.companyColor+'">●</span> '+esc(g.companyName)+' / '+esc(g.projectName)+' <span style="font-size:11px;color:var(--text3);font-weight:400">('+g.tasks.length+')</span></div>';
    for(const t of g.tasks){
      const priIcon={high:'🔴',med:'🟡',low:'🟢'}[t.priority]||'';
      const statusColor={todo:'var(--text3)',doing:'var(--accent)',done:'var(--green)'}[t.status]||'var(--text3)';
      h+='<div class="calplan-task">';
      h+='<div class="calplan-status" style="background:'+statusColor+'" title="'+({todo:'未着手',doing:'進行中',done:'完了'}[t.status]||'')+'"></div>';
      h+='<div class="calplan-pri">'+priIcon+'</div>';
      h+='<div class="calplan-task-title" onclick="selectTask(\''+t.id+'\')" title="'+esc(t.title)+'">'+esc(t.title)+'</div>';
      h+='<div class="calplan-dates">';
      h+='<span style="font-size:10px;color:var(--accent);font-weight:700" title="アクション日">★</span>';
      h+='<input type="date" value="'+(t.actionDate||'')+'" onchange="calplanSetDate(\''+t.id+'\',\'actionDate\',this.value)" title="アクション日">';
      h+='<input type="time" value="'+(t.actionStartTime||'')+'" onchange="calplanSetDate(\''+t.id+'\',\'actionStartTime\',this.value)" title="開始時間">';
      h+='<span style="font-size:10px;color:var(--text3)">〜</span>';
      h+='<input type="time" value="'+(t.actionEndTime||'')+'" onchange="calplanSetDate(\''+t.id+'\',\'actionEndTime\',this.value)" title="終了時間">';
      h+='<span style="font-size:10px;color:var(--text3);margin-left:4px" title="締切日">📅</span>';
      h+='<input type="date" value="'+(t.dueDate||'')+'" onchange="calplanSetDate(\''+t.id+'\',\'dueDate\',this.value)" title="締切日">';
      if(hasCals){
        h+='<select class="calplan-gcal-sel" onchange="calplanSetCal(\''+t.id+'\',this.value)" title="登録先カレンダー">';
        for(const c of cals){
          h+='<option value="'+esc(c.id)+'"'+((t.gcalCalId===c.id||((!t.gcalCalId)&&c.primary))?' selected':'')+'>'+esc(c.summary)+'</option>';
        }
        h+='</select>';
      }
      h+='<select class="calplan-gcal-sel" style="width:80px" onchange="calplanSetGcalMode(\''+t.id+'\',this.value)" title="GCal登録モード">';
      h+='<option value=""'+(!t.gcalMode&&!t.gcal?' selected':'')+'>なし</option>';
      h+='<option value="action"'+(t.gcalMode==='action'||(t.gcal&&!t.gcalMode)?' selected':'')+'>★日</option>';
      h+='<option value="due"'+(t.gcalMode==='due'?' selected':'')+'>📅日</option>';
      h+='<option value="both"'+(t.gcalMode==='both'?' selected':'')+'>両方</option>';
      h+='</select>';
      var wt=calcTotalWorkTime(t);
      if(wt) h+='<span style="font-size:10px;color:var(--accent);font-weight:600;white-space:nowrap" title="合計作業時間">'+wt.replace('合計: ','')+'</span>';
      var logCount=(t.actionLogs||[]).length;
      if(logCount) h+='<span style="font-size:9px;color:var(--text3);white-space:nowrap" title="アクションログ数">+'+logCount+'件</span>';
      h+='</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  return h;
}

function calplanFilterBtn(val,label){
  return '<div class="calplan-filter-btn '+(_calplanFilter===val?'active':'')+'" onclick="setCalplanFilter(\''+val+'\')">'+label+'</div>';
}

function setCalplanFilter(val){
  _calplanFilter=val;

  if(bottom) bottom.innerHTML=buildCalplanTaskList();
}

function calplanSetDate(taskId,field,value){
  updateTask(taskId,{[field]:value});
  const r=getTask(taskId);
  if(r&&r.task.gcal&&state.gcalConnected&&
    (field==='actionDate'||field==='actionStartTime'||field==='actionEndTime'||field==='startDate'||field==='dueDate')){
    debouncedGcalSync(taskId,r);
  }
  calplanRefreshIframe();
  updateBadges();
}

function calplanSetCal(taskId,calId){
  updateTask(taskId,{gcalCalId:calId});
  const r=getTask(taskId);
  if(r&&r.task.gcal&&r.task.gcalMode&&state.gcalConnected&&_gcalAccessToken){
    syncGcalByMode(r.task,r.company,r.project);
  }
  calplanRefreshIframe();
}

function calplanSetGcalMode(taskId,mode){
  const r=getTask(taskId);if(!r)return;
  if(mode&&!state.gcalConnected){showToast('先にGoogleカレンダーを連携してください','error');openModal('integrations');return}
  updateTask(taskId,{gcal:!!mode,gcalMode:mode||''});
  if(mode&&state.gcalConnected&&_gcalAccessToken){
    syncGcalByMode(r.task,r.company,r.project);
  }
  calplanRefreshIframe();
}

function calplanRefreshIframe(){
  // Refresh the self-built calendar after task changes
  setTimeout(function(){buildHomeWeekGrid();},500);
}

function initCalplanDivider(){
  const divider=document.getElementById('calplanDivider');
  const top=document.getElementById('calplanTop');
  if(!divider||!top)return;
  let startY,startH;
  function onMouseDown(e){
    e.preventDefault();
    startY=e.clientY;startH=top.offsetHeight;
    divider.classList.add('dragging');
    document.body.style.cursor='row-resize';
    document.body.style.userSelect='none';
    document.addEventListener('mousemove',onMouseMove);
    document.addEventListener('mouseup',onMouseUp);
  }
  function onMouseMove(e){
    e.preventDefault();
    const wrap=document.querySelector('.calplan-wrap');
    const maxH=wrap?(wrap.offsetHeight-200):window.innerHeight-200;
    const newH=Math.max(100,Math.min(maxH,startH+(e.clientY-startY)));
    top.style.height=newH+'px';
    _calplanTopH=newH;
  }
  function onMouseUp(){
    divider.classList.remove('dragging');
    document.body.style.cursor='';
    document.body.style.userSelect='';
    document.removeEventListener('mousemove',onMouseMove);
    document.removeEventListener('mouseup',onMouseUp);
  }
  divider.addEventListener('mousedown',onMouseDown);
}

function cycleStatus(id){
  const r=getTask(id);if(!r)return;
  const cycle={todo:'doing',doing:'done',done:'todo'};
  const newStatus=cycle[r.task.status];
  updateTask(id,{status:newStatus});
  // If recurring task marked done → advance to next occurrence
  if(newStatus==='done'&&r.task.recurrence&&r.task.recurrence.enabled){
    setTimeout(function(){
      advanceRecurringTask(r.task,r.company,r.project);
      save();renderAll();
      showToast('🔄 次回: '+r.task.actionDate+' に更新しました');
    },500);
  }
  renderAll();
  if(ui.selectedTaskId===id)renderDetail(id);
}

function selectTask(id){
  ui.selectedTaskId=id;
  try{renderContent();}catch(e){console.error('renderContent error:',e);}
  try{renderDetail(id);}catch(e){console.error('renderDetail error:',e);}
}

// LIST DRAG & DROP
// ============================================================
let listDnd={draggingId:null,draggingEl:null};

function initListDnD(){
  document.querySelectorAll('.task-item[draggable="true"]').forEach(el=>{
    el.addEventListener('dragstart',onListDragStart,{passive:false});
    el.addEventListener('dragend',onListDragEnd);
    el.addEventListener('dragover',onListDragOver,{passive:false});
    el.addEventListener('dragleave',onListDragLeave);
    el.addEventListener('drop',onListDrop);
  });
}

function onListDragStart(e){
  const el=e.currentTarget;
  listDnd.draggingId=el.dataset.id;
  listDnd.draggingEl=el;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',listDnd.draggingId);
  setTimeout(()=>el.classList.add('list-dragging'),0);
}

function onListDragEnd(e){
  e.currentTarget.classList.remove('list-dragging');
  document.querySelectorAll('.task-item.list-drag-over-top,.task-item.list-drag-over-bottom').forEach(el=>{
    el.classList.remove('list-drag-over-top','list-drag-over-bottom');
  });
  listDnd={draggingId:null,draggingEl:null};
}

function onListDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const el=e.currentTarget;
  if(el===listDnd.draggingEl)return;
  document.querySelectorAll('.task-item.list-drag-over-top,.task-item.list-drag-over-bottom').forEach(x=>{
    if(x!==el){x.classList.remove('list-drag-over-top','list-drag-over-bottom')}
  });
  const rect=el.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  if(e.clientY<mid){
    el.classList.add('list-drag-over-top');
    el.classList.remove('list-drag-over-bottom');
  }else{
    el.classList.add('list-drag-over-bottom');
    el.classList.remove('list-drag-over-top');
  }
}

function onListDragLeave(e){
  const el=e.currentTarget;
  if(!el.contains(e.relatedTarget)){
    el.classList.remove('list-drag-over-top','list-drag-over-bottom');
  }
}

function onListDrop(e){
  e.preventDefault();
  const targetEl=e.currentTarget;
  const targetId=targetEl.dataset.id;
  const sourceId=listDnd.draggingId;
  if(!sourceId||sourceId===targetId){
    targetEl.classList.remove('list-drag-over-top','list-drag-over-bottom');
    return;
  }

  const isTop=targetEl.classList.contains('list-drag-over-top');
  targetEl.classList.remove('list-drag-over-top','list-drag-over-bottom');

  const rSrc=getTask(sourceId);
  const rTgt=getTask(targetId);
  if(!rSrc||!rTgt)return;

  // If same project: reorder tasks array
  if(rSrc.project===rTgt.project||rSrc.task.projectId===rTgt.task.projectId){
    const tasks=rSrc.project.tasks;
    const srcIdx=tasks.findIndex(t=>t.id===sourceId);
    const tgtIdx=tasks.findIndex(t=>t.id===targetId);
    if(srcIdx<0||tgtIdx<0)return;
    const [moved]=tasks.splice(srcIdx,1);
    const newIdx=tasks.findIndex(t=>t.id===targetId);
    tasks.splice(isTop?newIdx:newIdx+1,0,moved);
    save();
    renderAll();
    if(ui.selectedTaskId===sourceId)renderDetail(sourceId);
    showToast('タスクを並び替えました');
  } else {
    // Cross-project: move task to target project, insert near target position
    const srcProject=rSrc.project;
    const tgtProject=rTgt.project;
    const movedTask=rSrc.task;
    srcProject.tasks=srcProject.tasks.filter(t=>t.id!==sourceId);
    const tgtIdx=tgtProject.tasks.findIndex(t=>t.id===targetId);
    tgtProject.tasks.splice(isTop?tgtIdx:tgtIdx+1,0,movedTask);
    save();
    renderAll();
    if(ui.selectedTaskId===sourceId)renderDetail(sourceId);
    showToast(`「${movedTask.title}」を「${rTgt.project.name}」に移動`);
  }
}

function setTodoActionDate(taskId,todoId,date){
  const r=getTask(taskId);if(!r)return;
  const td=r.task.todos.find(x=>x.id===todoId);if(!td)return;
  const oldDate=td.actionDate||'';
  td.actionDate=date;
  save();updateBadges();
  if(state.gcalConnected&&_gcalAccessToken&&date){
    syncTodoToGcal(r,td);
  } else if(state.gcalConnected&&_gcalAccessToken&&!date&&oldDate&&td.gcalEventId){
    deleteTodoFromGcal(td,r.task);
  }
  if(ui.view==='home') renderContent();
  else if(ui.selectedTaskId===taskId) renderDetail(taskId);
}
function setTodoActionTime(taskId,todoId,field,value){
  const r=getTask(taskId);if(!r)return;
  const td=r.task.todos.find(x=>x.id===todoId);if(!td)return;
  td[field]=value;
  save();
  if(state.gcalConnected&&_gcalAccessToken&&td.actionDate){
    syncTodoToGcal(r,td);
  }
  if(ui.selectedTaskId===taskId) renderDetail(taskId);
}
async function syncTodoToGcal(r,td){
  var calId=getTaskCalId(r.task);
  var event={
    summary:'★ '+td.text+' ('+r.task.title+')',
    description:r.company.name+' / '+r.project.name,
  };
  if(td.actionStartTime&&td.actionEndTime){
    event.start={dateTime:td.actionDate+'T'+td.actionStartTime+':00',timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone};
    event.end={dateTime:td.actionDate+'T'+td.actionEndTime+':00',timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone};
  }else if(td.actionStartTime){
    var endT=td.actionStartTime.split(':');var eH=parseInt(endT[0])+1;
    event.start={dateTime:td.actionDate+'T'+td.actionStartTime+':00',timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone};
    event.end={dateTime:td.actionDate+'T'+String(eH).padStart(2,'0')+':'+endT[1]+':00',timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone};
  }else{
    event.start={date:td.actionDate};
    event.end={date:addDays(td.actionDate,1)};
  }
  try{
    if(td.gcalEventId){
      await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events/'+td.gcalEventId,{method:'PATCH',body:JSON.stringify(event)});
      showToast('📅 Todoのカレンダー予定を更新しました');
    }else{
      var created=await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events',{method:'POST',body:JSON.stringify(event)});
      td.gcalEventId=created.id;save();
      showToast('📅 Todoをカレンダーに登録しました');
    }
    await fetchGcalEvents();
    if(ui.view==='home')renderContent();
  }catch(e){
    console.error('GCal todo sync failed:',e);
    showToast('カレンダー登録に失敗しました','error');
  }
}
async function deleteTodoFromGcal(td,task){
  if(!td.gcalEventId)return;
  var calId=getTaskCalId(task);
  try{
    await fetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events/'+td.gcalEventId,{
      method:'DELETE',headers:{'Authorization':'Bearer '+_gcalAccessToken}
    });
    td.gcalEventId=null;save();
    showToast('📅 Todoのカレンダー予定を削除しました');
    await fetchGcalEvents();
    if(ui.view==='home')renderContent();
  }catch(e){
    console.error('GCal todo delete failed:',e);
  }
}

function calcLogDuration(log){
  if(!log.startTime||!log.endTime)return '';
  const s=log.startTime.split(':').map(Number);
  const e=log.endTime.split(':').map(Number);
  const mins=(e[0]*60+e[1])-(s[0]*60+s[1]);
  if(mins<=0)return '';
  const h=Math.floor(mins/60);
  const m=mins%60;
  return h>0?(m>0?h+'h'+m+'m':h+'h'):m+'m';
}

function calcTotalWorkTime(t){
  let totalMins=0;
  // Main action time
  if(t.actionStartTime&&t.actionEndTime){
    const s=t.actionStartTime.split(':').map(Number);
    const e=t.actionEndTime.split(':').map(Number);
    const m=(e[0]*60+e[1])-(s[0]*60+s[1]);
    if(m>0) totalMins+=m;
  }
  // Action logs
  for(const log of (t.actionLogs||[])){
    if(log.startTime&&log.endTime){
      const s=log.startTime.split(':').map(Number);
      const e=log.endTime.split(':').map(Number);
      const m=(e[0]*60+e[1])-(s[0]*60+s[1]);
      if(m>0) totalMins+=m;
    }
  }
  if(!totalMins) return '';
  const h=Math.floor(totalMins/60);
  const m=totalMins%60;
  return '合計: '+(h>0?(m>0?h+'h'+m+'m':h+'h'):m+'m');
}

function updateActionLog(taskId,logId,field,value){
  const r=getTask(taskId);if(!r)return;
  const log=(r.task.actionLogs||[]).find(l=>l.id===logId);

  log[field]=value;
  save();

  if(log.date&&log.startTime&&log.endTime&&state.gcalConnected&&_gcalAccessToken){
    syncActionLogToGcal(r,log);
  }
  // Re-render logs section only (avoid full re-render flicker)

  if(logsEl) logsEl.innerHTML=renderActionLogs(r.task);

function removeActionLog(taskId,logId){
  const r=getTask(taskId);if(!r)return;
  const logs=r.task.actionLogs||[];
  const log=logs.find(l=>l.id===logId);
  if(!log)return;
  // Delete from GCal if synced
  if(log.gcalEventId&&state.gcalConnected&&_gcalAccessToken){
    deleteActionLogFromGcal(log,r.task);
  }
  r.task.actionLogs=logs.filter(l=>l.id!==logId);
  save();renderDetail(taskId);
}

async function syncActionLogToGcal(r,log){
  const calId=getTaskCalId(r.task);
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const event={
    summary:'★ ['+r.company.name+'] '+r.task.title+' (ログ)',
    description:r.project.name+': '+(r.task.note||''),
    start:{dateTime:log.date+'T'+log.startTime+':00',timeZone:tz},
    end:{dateTime:log.date+'T'+log.endTime+':00',timeZone:tz},
  };
  try{
    if(log.gcalEventId){
      await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events/'+log.gcalEventId,{method:'PATCH',body:JSON.stringify(event)});
      showToast('📅 アクションログのカレンダー予定を更新しました');
    }else{
      const created=await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events',{method:'POST',body:JSON.stringify(event)});
      log.gcalEventId=created.id;save();
      showToast('📅 アクションログをカレンダーに登録しました');
    }

  }catch(e){
    console.error('GCal action log sync failed:',e);

  }
}

async function deleteActionLogFromGcal(log,task){
  if(!log.gcalEventId)return;

    await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events/'+log.gcalEventId,{method:'DELETE'});

    showToast('📅 アクションログのカレンダー予定を削除しました');

var _gcalSyncTimers={};
function saveDetailField(id,field,value){
  updateTask(id,{[field]:value.trim()});
  renderAll();
  const r=getTask(id);
  // Trigger GCal update if dates/times changed — debounced to avoid multiple syncs
  if(r&&r.task.gcal&&state.gcalConnected&&
    (field==='startDate'||field==='dueDate'||field==='actionDate'||field==='actionStartTime'||field==='actionEndTime')){
    debouncedGcalSync(id,r);
  }
}
function debouncedGcalSync(taskId,r){
  if(_gcalSyncTimers[taskId]) clearTimeout(_gcalSyncTimers[taskId]);
  _gcalSyncTimers[taskId]=setTimeout(function(){
    delete _gcalSyncTimers[taskId];
    const fresh=getTask(taskId);if(!fresh)return;
    if(fresh.task.gcalMode){
      syncGcalByMode(fresh.task,fresh.company,fresh.project);
    }else{
      updateGcalEvent(fresh.task,fresh.company,fresh.project);
    }
  },2000); // 2秒待ってから同期（続けて入力する時間を確保）
}

async function syncGcalByMode(task,company,project){
  const mode=task.gcalMode||'action';
  const calId=getTaskCalId(task);
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  // Delete old events if they exist
  if(task.gcalEventId){
    try{await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events/'+task.gcalEventId,{method:'DELETE'});}catch(e){}
  }
  if(task.gcalEventIdDue){
    try{await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events/'+task.gcalEventIdDue,{method:'DELETE'});}catch(e){}
  }
  const updates={gcalEventId:'',gcalEventIdDue:''};
  try{
    // Action date event
    if((mode==='action'||mode==='both')&&task.actionDate){
      const ev={summary:'★ ['+company.name+'] '+task.title,description:project.name+': '+(task.note||'')};
      if(task.actionStartTime&&task.actionEndTime){
        ev.start={dateTime:task.actionDate+'T'+task.actionStartTime+':00',timeZone:tz};
        ev.end={dateTime:task.actionDate+'T'+task.actionEndTime+':00',timeZone:tz};
      }else if(task.actionStartTime){
        const endT=task.actionStartTime.split(':');const eH=parseInt(endT[0])+1;
        ev.start={dateTime:task.actionDate+'T'+task.actionStartTime+':00',timeZone:tz};
        ev.end={dateTime:task.actionDate+'T'+String(eH).padStart(2,'0')+':'+endT[1]+':00',timeZone:tz};
      }else{
        ev.start={date:task.actionDate};ev.end={date:addDays(task.actionDate,1)};
      }
      if(task.recurrence?.enabled){const rrule=buildRecurrenceGcalRrule(task.recurrence);if(rrule)ev.recurrence=[rrule];}
      const created=await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events',{method:'POST',body:JSON.stringify(ev)});
      updates.gcalEventId=created.id;
    }
    // Due date event
    if((mode==='due'||mode==='both')&&(task.dueDate||task.startDate)){
      const ev={summary:'📅 ['+company.name+'] '+task.title,description:project.name+': '+(task.note||'')};
      ev.start=task.startDate?{date:task.startDate}:{date:task.dueDate};
      ev.end=task.dueDate?{date:addDays(task.dueDate,1)}:{date:addDays(task.startDate,1)};
      if(task.recurrence?.enabled){const rrule=buildRecurrenceGcalRrule(task.recurrence);if(rrule)ev.recurrence=[rrule];}
      const created=await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events',{method:'POST',body:JSON.stringify(ev)});
      updates.gcalEventIdDue=created.id;
    }
    updateTask(task.id,updates);
    showToast('📅 Googleカレンダーに登録しました');
    await fetchGcalEvents();
    if(ui.view==='home')renderContent();
  }catch(e){
    console.error('GCal sync failed:',e);
    showToast('カレンダー登録に失敗しました','error');
  }
}

function closeDetail(){
  document.getElementById('detailPanel').classList.add('hidden');
  ui.selectedTaskId=null;renderContent();
}

function deleteTask(id){
  if(!confirm('このタスクを削除しますか？'))return;
  for(const c of state.companies)for(const p of c.projects){
    const i=p.tasks.findIndex(t=>t.id===id);
    if(i>=0){p.tasks.splice(i,1);save();closeDetail();renderAll();showToast('タスクを削除しました');return}
  }
}

// --- Column definitions per groupBy ---
function getKanbanColumns(tasks){
  const gb=state.kanban.groupBy;
  if(gb==='status'){
    return[
      {key:'todo',  label:'未着手',  color:'#aaa89e', dot:'#aaa89e'},
      {key:'doing', label:'進行中',color:'#d4820e', dot:'#d4820e'},
      {key:'done',  label:'完了',  color:'#27ae60', dot:'#27ae60'},
    ].map(col=>({...col, tasks: tasks.filter(t=>t.status===col.key)}));
  }
  if(gb==='company'){
    return state.companies.map(c=>({
      key: c.id,
      label: c.name,
      color: c.color,
      dot: c.color,
      tasks: tasks.filter(t=>t.companyId===c.id),
    }));
  }
  if(gb==='project'){
    const cols=[];
    for(const c of state.companies){
      for(const p of c.projects){
        const ptasks=tasks.filter(t=>t.projectId===p.id);
        cols.push({key:p.id, label:p.name, color:c.color, dot:c.color, sub:c.name, tasks:ptasks});
      }
    }
    return cols;
  }
  return[];
}

// ===== DRAG AND DROP =====
let dnd={
  dragging: null,    // card element
  taskId: null,
  sourceCol: null,
  placeholder: null,
  overCol: null,
};

function initKanbanDnD(){
  // Card drag events
  document.querySelectorAll('.kanban-card').forEach(card=>{
    card.addEventListener('dragstart', onCardDragStart);
    card.addEventListener('dragend', onCardDragEnd);
  });
  // Column drop zones
  document.querySelectorAll('.kanban-cards').forEach(col=>{
    col.addEventListener('dragover', onColDragOver);
    col.addEventListener('dragenter', onColDragEnter);
    col.addEventListener('dragleave', onColDragLeave);
    col.addEventListener('drop', onColDrop);
  });
}

function onCardDragStart(e){
  const card=e.currentTarget;
  dnd.taskId=card.dataset.id;
  dnd.dragging=card;
  dnd.sourceCol=card.closest('.kanban-cards').dataset.col;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain', dnd.taskId);
  // Create placeholder
  dnd.placeholder=document.createElement('div');
  dnd.placeholder.className='kanban-card drag-placeholder';
  dnd.placeholder.style.height=card.offsetHeight+'px';
  dnd.placeholder.style.pointerEvents='none';
}

function onCardDragEnd(e){
  const card=e.currentTarget;
  card.classList.remove('dragging');
  dnd.placeholder?.remove();
  document.querySelectorAll('.kanban-col.drag-over').forEach(c=>c.classList.remove('drag-over'));
  dnd={dragging:null,taskId:null,sourceCol:null,placeholder:null,overCol:null};
}

function onColDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  if(!dnd.placeholder||!dnd.dragging)return;
  const col=e.currentTarget;
  const afterEl=getDragAfterElement(col,e.clientY);
  if(afterEl==null){
    col.appendChild(dnd.placeholder);
  } else {
    col.insertBefore(dnd.placeholder, afterEl);
  }
}

function onColDragEnter(e){
  e.preventDefault();
  const col=e.currentTarget;
  col.closest('.kanban-col').classList.add('drag-over');
}

function onColDragLeave(e){
  const col=e.currentTarget;
  // Only remove if leaving the column entirely
  if(!col.contains(e.relatedTarget)){
    col.closest('.kanban-col').classList.remove('drag-over');
  }
}

function onColDrop(e){
  e.preventDefault();
  const targetCardsEl=e.currentTarget;
  const targetColKey=targetCardsEl.dataset.col;
  targetCardsEl.closest('.kanban-col').classList.remove('drag-over');
  if(!dnd.taskId||targetColKey===dnd.sourceCol&&!dnd.placeholder){}

  if(dnd.taskId && targetColKey!==dnd.sourceCol){
    applyKanbanMove(dnd.taskId, targetColKey);
  } else if(dnd.taskId && dnd.placeholder){
    // Reorder within same column (visual only for list-based data)
    applyKanbanMove(dnd.taskId, targetColKey);
  }
  dnd.placeholder?.remove();
}

function getDragAfterElement(container, y){
  const draggableEls=[...container.querySelectorAll('.kanban-card:not(.dragging):not(.drag-placeholder)')];
  return draggableEls.reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset){return{offset,element:child}}
    return closest;
  },{offset:Number.NEGATIVE_INFINITY}).element||null;
}

function applyKanbanMove(taskId, targetColKey){
  const gb=state.kanban.groupBy;
  const r=getTask(taskId);
  if(!r)return;
  const {task,company,project}=r;

  if(gb==='status'){
    const prevStatus=task.status;
    updateTask(taskId,{status:targetColKey});
    if(prevStatus!==targetColKey)showToast(`「${task.title}」を「${{todo:'未着手',doing:'進行中',done:'完了'}[targetColKey]}」に移動`);
  } else if(gb==='company'){
    // Move task to the first project of target company
    const targetCompany=getCompany(targetColKey);
    if(!targetCompany||!targetCompany.projects.length){showToast('移動先の企業にプロジェクトがありません','error');renderContent();return}
    // Remove from source project
    project.tasks=project.tasks.filter(t=>t.id!==taskId);
    // Add to first project of target company
    const targetProject=targetCompany.projects[0];
    task.companyId=targetCompany.id;
    targetProject.tasks.push(task);
    save();
    showToast(`「${task.title}」を「${targetCompany.name}」に移動`);
  } else if(gb==='project'){
    // Move task to target project
    let targetProject=null, targetCompany=null;
    for(const c of state.companies){
      const p=c.projects.find(p=>p.id===targetColKey);
      if(p){targetProject=p;targetCompany=c;break}
    }
    if(!targetProject){renderContent();return}
    project.tasks=project.tasks.filter(t=>t.id!==taskId);
    targetProject.tasks.push(task);
    save();
    showToast(`「${task.title}」を「${targetProject.name}」に移動`);
  }
  renderAll();
  if(ui.selectedTaskId===taskId)renderDetail(taskId);
}

// ============================================================
// TIMELINE / GANTT — CSS-grid approach (no per-row DOM columns)
// ============================================================
function renderTimeline(container){
 try{
  // Reset container styling
  container.className='content';
  container.style.cssText='padding:0;overflow:hidden;overflow-x:hidden;overflow-y:hidden;display:flex;flex-direction:column;min-height:0;';

  let tasks=getAllTasks().filter(t=>t.startDate&&t.dueDate&&t.startDate.length===10&&t.dueDate.length===10);
  if(ui.view==='project') tasks=tasks.filter(t=>t.projectId===ui.projectId);
  else if(ui.view==='company') tasks=tasks.filter(t=>t.companyId===ui.companyId);

  if(!tasks.length){
    container.style.cssText='padding:20px;overflow-y:auto;';
    container.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">期間設定されたタスクがありません</div><div style="font-size:12px;color:var(--text3);margin-top:8px">タスクに「開始日」と「締め切り」を設定するとタイムラインに表示されます</div></div>';
    return;
  }

  const zoom=ui.ganttZoom||'month';
  const DAY_W=zoom==='week'?56:zoom==='month'?28:14;
  const LABEL_W=220;
  const ROW_H=36;

  // Date range
  const todayStr=today();
  let minDate=tasks.map(t=>t.startDate).reduce((a,b)=>a<b?a:b);
  let maxDate=tasks.map(t=>t.dueDate).reduce((a,b)=>a>b?a:b);
  minDate=addDays(minDate,-3);
  maxDate=addDays(maxDate,7);

  // Build cols array
  const cols=[];
  let cur=minDate;
  while(cur<=maxDate){cols.push(cur);cur=addDays(cur,1);}
  const N=cols.length;
  const totalW=N*DAY_W;
  const todayIdx=cols.indexOf(todayStr);

  // Month labels
  const months=[];
  let lastM='';
  cols.forEach((d,i)=>{
    const m=d.slice(0,7);
    if(m!==lastM){months.push({label:parseInt(d.slice(5,7))+'月',idx:i});lastM=m;}
  });

  // Zoom step for day labels
  const step=zoom==='week'?1:zoom==='month'?2:4;

  // Project color map
  const pColors=['#3b7dd8','#e85d3a','#2a9e6e','#d4820e','#7c4ddb','#0e9ec4','#e85d9a'];
  let pci=0;const pcMap={};
  for(const co of state.companies)for(const pr of co.projects){pcMap[pr.id]=pColors[pci%pColors.length];pci++;}

  // Build row list: company header, project header, task rows
  const rows=[];
  const compMap={};const compOrder=[];
  for(const t of tasks){
    if(!compMap[t.companyId]){
      compMap[t.companyId]={id:t.companyId,name:t.companyName,color:t.companyColor,projects:[]};
      compOrder.push(t.companyId);
    }
    const co=compMap[t.companyId];
    let pr=co.projects.find(p=>p.id===t.projectId);
    if(!pr){pr={id:t.projectId,name:t.projectName,color:pcMap[t.projectId]||'#999',tasks:[]};co.projects.push(pr);}
    pr.tasks.push(t);
  }
  for(const cid of compOrder){
    const co=compMap[cid];
    rows.push({type:'company',label:`<span style="color:${co.color}">●</span> ${esc(co.name)}`,style:'background:var(--surface2);font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px',bars:[]});
    for(const pr of co.projects){
      rows.push({type:'project',label:`📁 ${esc(pr.name)}`,style:'font-size:12px;font-weight:600;padding-left:14px',bars:[]});
      for(const t of pr.tasks){
        const si=cols.indexOf(t.startDate);
        const ei=cols.indexOf(t.dueDate);
        const dc=dueCls(t.dueDate,t.status);
        const barColor=t.status==='done'?'#9caea9':dc==='overdue'?'#dc3545':dc==='soon'?'#f59f1f':pr.color;
        const bars=(si>=0&&ei>=0)?[{si,ei,color:barColor,label:t.title,id:t.id,done:t.status==='done'}]:[];
        rows.push({type:'task',label:`<span style="padding-left:28px;font-size:12px;color:var(--text2)">${esc(t.title)}</span>`,taskId:t.id,bars,style:''});
      }
    }
  }

  // Generate HTML using a table-like approach with divs + absolute bars
  // Header row (month)
  let monthHTML='<div style="display:flex;flex-shrink:0;">';
  let lastMIdx=0;
  for(let mi=0;mi<months.length;mi++){
    const nextIdx=mi+1<months.length?months[mi+1].idx:N;
    const w=(nextIdx-months[mi].idx)*DAY_W;
    monthHTML+=`<div style="width:${w}px;flex-shrink:0;font-size:11px;font-weight:700;color:var(--text2);padding:4px 6px;border-right:1px solid var(--border);box-sizing:border-box;white-space:nowrap;overflow:hidden">${months[mi].label}</div>`;
  }
  monthHTML+='</div>';

  // Day header
  let dayHTML='<div style="display:flex;flex-shrink:0;">';
  cols.forEach((d,i)=>{
    const isT=d===todayStr;
    const show=isT||(i%step===0);
    const day=new Date(d+'T00:00:00').getDate();
    const wday=['日','月','火','水','木','金','土'][new Date(d+'T00:00:00').getDay()];
    dayHTML+=`<div style="width:${DAY_W}px;flex-shrink:0;text-align:center;font-size:10px;font-weight:${isT?700:400};color:${isT?'var(--accent)':'var(--text3)'};background:${isT?'var(--accent-light)':'transparent'};border-right:1px solid var(--border);padding:3px 0;box-sizing:border-box;line-height:1.2">${show?day+'<br><span style="font-size:9px">'+wday+'</span>':''}</div>`;
  });
  dayHTML+='</div>';

  // Body rows
  let bodyHTML='';
  for(const row of rows){
    const barAreaHTML=row.bars.length?row.bars.map(function(b){
      const x=b.si*DAY_W;
      const w=(b.ei-b.si+1)*DAY_W;
      const label=esc(b.label).replace(/"/g,'&quot;');
      return '<div style="position:absolute;left:'+x+'px;top:50%;transform:translateY(-50%);width:'+w+'px;height:22px;background:'+b.color+';border-radius:5px;display:flex;align-items:center;padding:0 7px;cursor:pointer;box-sizing:border-box;opacity:'+(b.done?0.5:1)+'" onclick="selectTask(\''+b.id+'\')" title="'+label+'" onmouseenter="this.style.filter=\'brightness(.85)\'" onmouseleave="this.style.filter=\'\'"><span style="font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600">'+esc(b.label)+'</span></div>';
    }).join(''):'';

    const todayColHTML=todayIdx>=0?'<div style="position:absolute;left:'+(todayIdx*DAY_W)+'px;top:0;bottom:0;width:'+DAY_W+'px;background:rgba(59,125,216,.04);pointer-events:none"></div>':'';

    const isTask=(row.type==='task');
    const baseStyle='display:flex;border-bottom:1px solid var(--border);min-height:'+ROW_H+'px;align-items:center;'+(row.style||'');
    const cursorStyle=isTask?'cursor:pointer;':'';
    const parts=['<div style="'+baseStyle+cursorStyle+'"'];
    if(isTask&&row.taskId){
      parts.push(' onclick="selectTask(\''+row.taskId+'\')"');
      parts.push(' onmouseenter="this.style.background=\'var(--surface2)\'"');
      parts.push(' onmouseleave="this.style.background=\'\'"');
    }
    parts.push('>');
    parts.push('<div style="width:'+LABEL_W+'px;min-width:'+LABEL_W+'px;flex-shrink:0;border-right:1px solid var(--border);padding:6px 10px;box-sizing:border-box;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+row.label+'</div>');
    parts.push('<div style="position:relative;flex:1;height:'+ROW_H+'px;overflow:hidden;width:'+totalW+'px;min-width:'+totalW+'px">'+todayColHTML+barAreaHTML+'</div>');
    parts.push('</div>');
    bodyHTML+=parts.join('');
  }

  // Today vertical line
  const todayLineHTML=todayIdx>=0?`<div style="position:absolute;top:0;bottom:0;left:${LABEL_W+todayIdx*DAY_W+DAY_W/2}px;width:2px;background:var(--accent);opacity:.6;pointer-events:none;z-index:10"></div>`:'';

  container.innerHTML=
    `<div style="padding:12px 16px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text2);font-weight:600">📊 タイムライン</span>
      <div class="gantt-zoom">
        <div class="gantt-zoom-btn ${zoom==='week'?'active':''}" onclick="setGanttZoom('week')">週</div>
        <div class="gantt-zoom-btn ${zoom==='month'?'active':''}" onclick="setGanttZoom('month')">月</div>
        <div class="gantt-zoom-btn ${zoom==='quarter'?'active':''}" onclick="setGanttZoom('quarter')">四半期</div>
      </div>
      <span style="font-size:11px;color:var(--text3)">バーをクリックでタスク詳細を開く</span>
    </div>
    <div id="tlScroll" style="flex:1;overflow:auto;position:relative;">
      <div style="position:relative;">
        <!-- Sticky header wrapper -->
        <div style="position:sticky;top:0;z-index:30;background:var(--surface);">
          <div style="display:flex;border-bottom:1px solid var(--border);">
            <div style="width:${LABEL_W}px;min-width:${LABEL_W}px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface2);padding:4px 10px;font-size:10px;font-weight:700;color:var(--text3)">タスク</div>
            <div style="overflow:hidden;position:relative;width:${totalW}px;min-width:${totalW}px;">
              ${monthHTML}
              ${dayHTML}
            </div>
          </div>
        </div>
        <!-- Body with today vertical line overlay -->
        <div style="position:relative;">
          ${todayLineHTML}
          ${bodyHTML}
        </div>
      </div>
    </div>`;

  // Auto scroll to today
  if(todayIdx>=0){
    requestAnimationFrame(()=>{
      const sc=document.getElementById('tlScroll');
      if(sc) sc.scrollLeft=Math.max(0,(todayIdx-3)*DAY_W);
    });
  }
 }catch(e){
  console.error('Timeline render error:',e);
  container.style.cssText='padding:20px;overflow-y:auto;';
  container.innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">タイムラインの表示中にエラーが発生しました</div><div style="font-size:12px;color:var(--text3);margin-top:8px">'+esc(e.message)+'</div></div>';
 }
}

let _modalState={};

function openModal(type, ...args){
  _modalState={type,args};
  const overlay=document.getElementById('overlay');
  const mc=document.getElementById('modalContent');
  mc.innerHTML=buildModal(type,...args);
  overlay.classList.add('open');
  setTimeout(()=>mc.querySelector('input,textarea')?.focus(),100);
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}

function buildModal(type,...args){
  if(type==='addCompany')return buildAddCompany();
  if(type==='editCompany')return buildEditCompany(args[0]);
  if(type==='editProject')return buildEditProject(args[0],args[1]);
  if(type==='addProject')return buildAddProject(args[0]);
  if(type==='addTask')return buildAddTask(args[0],args[1],args[2]);
  if(type==='editTask')return buildEditTask(args[0]);
  if(type==='integrations')return buildIntegrations();
  if(type==='kanbanSettings')return buildKanbanSettings();
  if(type==='csvExport')return buildCsvExport();
  if(type==='recurrence')return buildRecurrenceModal(args[0]);
  if(type==='inboxClassify')return buildInboxClassify(args[0]);
  if(type==='inboxDelegate')return buildInboxDelegate(args[0]);
  return'';
}

function updateRecurrencePreview(){
  const type=document.getElementById('m-rec-type')?.value;
  if(!type)return;
  // Show/hide sections
  document.getElementById('rec-monthly-day').style.display=type==='monthly_day'?'':'none';
  document.getElementById('rec-monthly-weekday').style.display=type==='monthly_weekday'?'':'none';
  document.getElementById('rec-weekly').style.display=type==='weekly'?'':'none';
  // Build preview
  const wdNames=['日','月','火','水','木','金','土'];
  const rec=getRecurrenceFromModal();
  const previewEl=document.getElementById('rec-preview');
  const nextEl=document.getElementById('rec-next-dates');
  if(previewEl)previewEl.textContent=recurrenceLabel(rec);
  // Show next 3 dates
  if(nextEl){
    let dates=[];let d=today();
    for(let i=0;i<3;i++){
      const next=getNextRecurrenceDate(rec,d);
      if(next){dates.push(next);d=next;}else break;
    }
    nextEl.textContent=dates.length?'次回: '+dates.join(' → '):'';
  }
}

function getRecurrenceFromModal(){
  const type=document.getElementById('m-rec-type').value;
  const rec={type,enabled:true};
  if(type==='monthly_day'){
    rec.day=parseInt(document.getElementById('m-rec-day').value);
  }else if(type==='monthly_weekday'){
    rec.week=parseInt(document.getElementById('m-rec-week').value);
    rec.weekday=parseInt(document.getElementById('m-rec-weekday-mw').value);
  }else if(type==='weekly'){
    rec.weekday=parseInt(document.getElementById('m-rec-weekday-w').value);
  }
  return rec;
}

function doSaveRecurrence(taskId){
  const r=getTask(taskId);if(!r)return;
  const rec=getRecurrenceFromModal();
  rec.lastGenerated=today();
  r.task.recurrence=rec;
  save();closeModal();
  renderDetail(taskId);renderAll();

  if(r.task.gcal&&state.gcalConnected&&_gcalAccessToken){

  showToast('🔄 定期タスクを設定しました: '+recurrenceLabel(rec));

function removeRecurrence(taskId){

async function createGcalRecurringEvent(task,company,project){
  if(!state.gcalConnected||!_gcalAccessToken)return;
  const calId=getTaskCalId(task);
  const event=buildGcalEventBody(task,company,project);
  const rrule=buildRecurrenceGcalRrule(task.recurrence);
  if(rrule)event.recurrence=[rrule];
  event.summary='🔄 '+event.summary;
  try{
    const created=await gcalApiFetch(
      'https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events',
      {method:'POST',body:JSON.stringify(event)}
    );
    updateTask(task.id,{gcalEventId:created.id});
    showToast('📅 定期イベントをGoogleカレンダーに登録しました');
    await fetchGcalEvents();
    if(ui.view==='home')renderContent();
  }catch(e){
    console.error('GCal recurring create failed:',e);

}

  }
  if(checked){

  } else {
    state.gcalDisplayCalendars=state.gcalDisplayCalendars.filter(function(id){return id!==calId;});

async function doConnectGcal(){
  if(!GCAL_CLIENT_ID){
    showToast('Google Calendar Client IDが未設定です','error');
    closeModal();
    return;
  }
  const btn=document.querySelector('#modalContent .btn-primary');
  if(btn){btn.textContent='接続中...';btn.disabled=true;}
  try{
    if(typeof google==='undefined'||!google.accounts){
      showToast('Google認証ライブラリを読み込み中です。少し待ってから再試行してください。','error');
      if(btn){btn.textContent='連携を開始';btn.disabled=false;}
      return;
    }
    if(!_gcalTokenClient){
      _gcalTokenClient=google.accounts.oauth2.initTokenClient({
        client_id:GCAL_CLIENT_ID,
        scope:GCAL_SCOPES,
        callback:async(tokenResponse)=>{
          if(tokenResponse.error){
            showToast('認証に失敗しました: '+tokenResponse.error,'error');
            return;
          }
          _gcalAccessToken=tokenResponse.access_token;
          state.gcalConnected=true;
          // Fetch actual calendar ID (email) for embed
          try{
            const calInfo=await gcalApiFetch('https://www.googleapis.com/calendar/v3/calendars/primary');
            if(calInfo&&calInfo.id) state.gcalEmailId=calInfo.id;
          }catch(e){console.warn('Could not fetch calendar ID:',e);}
          save();updateIntDots();closeModal();
          showToast('Googleカレンダーと連携しました','success');
          await Promise.all([fetchGcalEvents(),fetchGcalCalendars()]);
          renderAll();
        },
      });
    }
    _gcalTokenClient.requestAccessToken();
  }catch(e){
    console.error('GCal connect error:',e);
    showToast('連携に失敗しました: '+e.message,'error');
    if(btn){btn.textContent='連携を開始';btn.disabled=false;}
  }
}
function doDisconnectGcal(){
  if(_gcalAccessToken&&typeof google!=='undefined'&&google.accounts){
    try{google.accounts.oauth2.revoke(_gcalAccessToken);}catch(e){}
  }
  _gcalAccessToken=null;_gcalTokenClient=null;
  state.gcalConnected=false;state.gcalEvents=[];state.gcalCalendars=[];state.gcalEmailId='';
  save();updateIntDots();closeModal();
  showToast('Googleカレンダーの連携を解除しました');renderAll();
}

async function gdriveApiFetch(url,options={}){
  if(!_gdriveAccessToken)throw new Error('Not authenticated');
  const resp=await fetch(url,{
    ...options,
    headers:{
      'Authorization':'Bearer '+_gdriveAccessToken,
      'Content-Type':'application/json',
      ...(options.headers||{}),
    },
  });
  if(resp.status===401){
    _gdriveAccessToken=null;
    state.gdriveConnected=false;
    save();updateIntDots();
    showToast('Google Drive認証が期限切れです。再接続してください。','error');
    throw new Error('Token expired');
  }
  if(!resp.ok)throw new Error('Drive API error: '+resp.status);
  return resp.json();
}

async function fetchDriveFiles(){
  if(!_gdriveAccessToken)return;
  try{
    const fields='files(id,name,mimeType,modifiedTime,viewedByMeTime,webViewLink,iconLink,thumbnailLink)';
    const q=encodeURIComponent("trashed=false");
    const url='https://www.googleapis.com/drive/v3/files?'+
      'orderBy=viewedByMeTime+desc&pageSize=20&q='+q+
      '&fields='+encodeURIComponent(fields);
    const data=await gdriveApiFetch(url);
    state.gdriveFiles=(data.files||[]).map(function(f){
      return{
        id:f.id,
        name:f.name,
        mimeType:f.mimeType,
        modifiedTime:f.modifiedTime,
        viewedByMeTime:f.viewedByMeTime,
        webViewLink:f.webViewLink,
        iconLink:f.iconLink,
      };
    });
    save();
    console.log('[GDrive] Fetched',state.gdriveFiles.length,'files');
  }catch(e){
    console.error('Failed to fetch Drive files:',e);
  }
}

function driveFileIcon(mimeType){
  if(!mimeType)return '📎';
  if(mimeType.includes('document'))return '📄';
  if(mimeType.includes('spreadsheet'))return '📊';
  if(mimeType.includes('presentation'))return '📽';
  if(mimeType.includes('folder'))return '📁';
  if(mimeType.includes('form'))return '📋';
  if(mimeType.includes('pdf')||mimeType==='application/pdf')return '📕';
  if(mimeType.includes('image'))return '🖼';
  if(mimeType.includes('video'))return '🎬';
  return '📎';
}

async function gcalApiFetch(url,options={},_isRetry){

    const refreshed=await gcalSilentRefresh();

  }
  const resp=await fetch(url,{
    ...options,
    headers:{
      'Authorization':'Bearer '+_gcalAccessToken,
      'Content-Type':'application/json',
      ...(options.headers||{}),
    },
  });
  if(resp.status===401&&!_isRetry){
    // Token expired → try silent refresh and retry once
    console.log('[GCal] Token expired, attempting silent refresh...');
    const refreshed=await gcalSilentRefresh();
    if(refreshed) return gcalApiFetch(url,options,true);
    _gcalAccessToken=null;
    state.gcalConnected=false;
    save();updateIntDots();
    showToast('認証が期限切れです。再接続してください。','error');
    throw new Error('Token expired');
  }
  if(resp.status===204) return {}; // DELETE returns no body
  if(!resp.ok)throw new Error('API error: '+resp.status);
  return resp.json();
}

function gcalSilentRefresh(){
  return new Promise(function(resolve){
    if(!GCAL_CLIENT_ID||typeof google==='undefined'||!google.accounts){resolve(false);return;}
    try{
      if(!_gcalTokenClient){
        _gcalTokenClient=google.accounts.oauth2.initTokenClient({
          client_id:GCAL_CLIENT_ID,
          scope:GCAL_SCOPES,
          callback:function(tokenResponse){
            if(tokenResponse.error){resolve(false);return;}
            _gcalAccessToken=tokenResponse.access_token;
            state.gcalConnected=true;save();updateIntDots();
            console.log('[GCal] Token refreshed silently');
            resolve(true);
          },
        });
      }
      // Use prompt:'' for silent/consent-less refresh (if user already granted)
      _gcalTokenClient.requestAccessToken({prompt:''});
    }catch(e){
      console.warn('[GCal] Silent refresh failed:',e);
      resolve(false);
    }
  });
}

async function fetchGcalEvents(){
  if(!_gcalAccessToken)return;
  const now=new Date();
  const timeMin=new Date(now);timeMin.setDate(timeMin.getDate()-7);
  const timeMax=new Date(now);timeMax.setDate(timeMax.getDate()+90);
  try{
    // Use selected display calendars, or fall back to primary
    var displayCals=state.gcalDisplayCalendars||[];
    const calIds=new Set();
    if(displayCals.length>0){
      displayCals.forEach(function(id){calIds.add(id);});
    } else {
      calIds.add(state.gcalCalendarId||'primary');
    }
    // Also add calendars used by tasks (for sync purposes)
    for(const c of state.companies)for(const p of c.projects)for(const t of p.tasks){if(t.gcalCalId)calIds.add(t.gcalCalId);}
    var allItems=[];
    for(const cid of calIds){
      const calId=encodeURIComponent(cid);
      const baseUrl='https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events?'+
        'timeMin='+timeMin.toISOString()+'&timeMax='+timeMax.toISOString()+
        '&singleEvents=true&orderBy=startTime&maxResults=2500';
      var pageToken=null;
      do{
        var url=baseUrl+(pageToken?'&pageToken='+pageToken:'');
        var data=await gcalApiFetch(url);
        allItems=allItems.concat(data.items||[]);
        pageToken=data.nextPageToken||null;
      }while(pageToken);
    }
    console.log('[GCal] Total:',allItems.length,'events from',calIds.size,'calendar(s)');

    // Collect Stride-created gcalEventIds for dedup
    var strideIds={};
    for(const c of state.companies)for(const p of c.projects)for(const t of p.tasks){
      if(t.gcalEventId)strideIds[t.gcalEventId]=true;
      if(t.gcalEventIdDue)strideIds[t.gcalEventIdDue]=true;
      (t.actionLogs||[]).forEach(function(l){if(l.gcalEventId)strideIds[l.gcalEventId]=true;});
      (t.todos||[]).forEach(function(td){if(td.gcalEventId)strideIds[td.gcalEventId]=true;});
    }

    const eventsById={};
    state.gcalEvents=[];
    allItems.forEach(function(e){
      // Skip Stride-created events (matched by ID or ★ prefix)
      if(strideIds[e.id]) return;
      if((e.summary||'').startsWith('★')) return;
      // Dedup by event ID (same event from multiple calendars)
      if(eventsById[e.id]) return;
      const ev={
        id:e.id,
        summary:e.summary||'(無題)',
        start:e.start.dateTime||e.start.date,
        end:e.end.dateTime||e.end.date,
        allDay:!!e.start.date,
        color:e.colorId||null,
        htmlLink:e.htmlLink,
      };
      eventsById[e.id]=ev;
      state.gcalEvents.push(ev);
    });
    save();
    // Still sync stride events (need full list for reverse sync)
    var allEventsById={};
    allItems.forEach(function(e){
      allEventsById[e.id]={
        id:e.id,summary:e.summary||'(無題)',
        start:e.start.dateTime||e.start.date,end:e.end.dateTime||e.end.date,
        allDay:!!e.start.date,color:e.colorId||null,htmlLink:e.htmlLink,
      };
    });
    syncGcalChangesToStride(allEventsById);
  }catch(e){
    console.error('Failed to fetch GCal events:',e);
  }
}

function syncGcalChangesToStride(eventsById){
  let changed=false;
  for(const c of state.companies){
    for(const p of c.projects){
      for(const t of p.tasks){
        // Check action date event (gcalEventId)
        if(t.gcalEventId&&eventsById[t.gcalEventId]){
          const ev=eventsById[t.gcalEventId];
          const evDate=(ev.start||'').slice(0,10);
          if(evDate&&t.actionDate&&evDate!==t.actionDate){
            console.log('[GCal Sync] Task "'+t.title+'" action date: '+t.actionDate+' → '+evDate);
            t.actionDate=evDate;
            changed=true;
          }
          // Sync start time if dateTime event
          if(ev.start&&ev.start.length>10){
            const evStartTime=ev.start.slice(11,16);
            if(evStartTime&&t.actionStartTime&&evStartTime!==t.actionStartTime){
              t.actionStartTime=evStartTime;changed=true;
            }
          }
          if(ev.end&&ev.end.length>10){
            const evEndTime=ev.end.slice(11,16);
            if(evEndTime&&t.actionEndTime&&evEndTime!==t.actionEndTime){
              t.actionEndTime=evEndTime;changed=true;
            }
          }
        }
        // Check due date event (gcalEventIdDue)
        if(t.gcalEventIdDue&&eventsById[t.gcalEventIdDue]){
          const ev=eventsById[t.gcalEventIdDue];
          const evStart=(ev.start||'').slice(0,10);
          const evEnd=(ev.end||'').slice(0,10);
          if(evStart&&t.startDate&&evStart!==t.startDate){
            console.log('[GCal Sync] Task "'+t.title+'" start date: '+t.startDate+' → '+evStart);
            t.startDate=evStart;changed=true;
          }
          if(evEnd){
            const dueDate=addDays(evEnd,-1);// GCal end date is exclusive
            if(t.dueDate&&dueDate!==t.dueDate){
              console.log('[GCal Sync] Task "'+t.title+'" due date: '+t.dueDate+' → '+dueDate);
              t.dueDate=dueDate;changed=true;
            }
          }
        }
        // Check todos with gcalEventId
        if(t.todos){
          for(const td of t.todos){
            if(td.gcalEventId&&eventsById[td.gcalEventId]){
              const ev=eventsById[td.gcalEventId];
              const evDate=(ev.start||'').slice(0,10);
              if(evDate&&td.actionDate&&evDate!==td.actionDate){
                console.log('[GCal Sync] Todo "'+td.text+'" date: '+td.actionDate+' → '+evDate);
                td.actionDate=evDate;changed=true;
              }
              if(ev.start&&ev.start.length>10){
                const st=ev.start.slice(11,16);
                if(st&&td.actionStartTime&&st!==td.actionStartTime){td.actionStartTime=st;changed=true;}
              }
              if(ev.end&&ev.end.length>10){
                const et=ev.end.slice(11,16);
                if(et&&td.actionEndTime&&et!==td.actionEndTime){td.actionEndTime=et;changed=true;}
              }
            }
          }
        }
        // Check action logs with gcalEventId
        if(t.actionLogs){
          for(const log of t.actionLogs){
            if(log.gcalEventId&&eventsById[log.gcalEventId]){
              const ev=eventsById[log.gcalEventId];
              const evDate=(ev.start||'').slice(0,10);
              if(evDate&&log.date&&evDate!==log.date){log.date=evDate;changed=true;}
              if(ev.start&&ev.start.length>10){
                const st=ev.start.slice(11,16);
                if(st&&log.startTime&&st!==log.startTime){log.startTime=st;changed=true;}
              }
              if(ev.end&&ev.end.length>10){
                const et=ev.end.slice(11,16);
                if(et&&log.endTime&&et!==log.endTime){log.endTime=et;changed=true;}
              }
            }
          }
        }
      }
    }
  }
  if(changed){
    save();
    showToast('📅 Googleカレンダーの変更をStrideに反映しました','info');
    renderAll();
  }
}

async function fetchGcalCalendars(){
  if(!_gcalAccessToken)return;
  try{
    const data=await gcalApiFetch('https://www.googleapis.com/calendar/v3/users/me/calendarList');
    state.gcalCalendars=(data.items||[]).filter(c=>c.accessRole==='owner'||c.accessRole==='writer').map(c=>({id:c.id,summary:c.summary||c.id,primary:!!c.primary,color:c.backgroundColor||''}));
    save();
  }catch(e){
    console.error('Failed to fetch calendar list:',e);
  }
}

function buildGcalEmbedUrl(){
  if(!state.gcalEmailId)return '';
  var tz=encodeURIComponent(Intl.DateTimeFormat().resolvedOptions().timeZone);
  var cals=state.gcalCalendars||[];
  // Find primary calendar color
  var primaryCal=cals.find(function(c){return c.id===state.gcalEmailId});
  var params='src='+encodeURIComponent(state.gcalEmailId);
  if(primaryCal&&primaryCal.color) params+='&color='+encodeURIComponent(primaryCal.color);
  for(var i=0;i<cals.length;i++){
    if(cals[i].id!==state.gcalEmailId){
      params+='&src='+encodeURIComponent(cals[i].id);
      if(cals[i].color) params+='&color='+encodeURIComponent(cals[i].color);
    }
  }
  return 'https://calendar.google.com/calendar/embed?'+params+'&ctz='+tz+'&mode=WEEK&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=1&showCalendars=1&showTz=0';
}

function getTaskCalId(task){
  return encodeURIComponent(task?.gcalCalId||state.gcalCalendarId||'primary');
}

function buildGcalEventBody(task,company,project){
  var tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  var ev={summary:'['+company.name+'] '+task.title,description:project.name+': '+(task.note||'')};
  if(task.actionDate&&task.actionStartTime&&task.actionEndTime){
    ev.start={dateTime:task.actionDate+'T'+task.actionStartTime+':00',timeZone:tz};
    ev.end={dateTime:task.actionDate+'T'+task.actionEndTime+':00',timeZone:tz};
  }else if(task.actionDate&&task.actionStartTime){
    var endT=task.actionStartTime.split(':');var eH=parseInt(endT[0])+1;
    ev.start={dateTime:task.actionDate+'T'+task.actionStartTime+':00',timeZone:tz};
    ev.end={dateTime:task.actionDate+'T'+String(eH).padStart(2,'0')+':'+endT[1]+':00',timeZone:tz};
  }else{
    ev.start=task.startDate?{date:task.startDate}:{date:task.dueDate||task.actionDate};
    ev.end=task.dueDate?{date:addDays(task.dueDate,1)}:{date:addDays(task.startDate||task.actionDate,1)};
  }
  return ev;
}
async function createGcalEvent(task,company,project){
  if(!state.gcalConnected)return;
  if(!_gcalAccessToken){
    showToast('📅 カレンダー登録: 再認証が必要です','error');
    return;
  }
  const calId=getTaskCalId(task);
  const event=buildGcalEventBody(task,company,project);
  try{
    const created=await gcalApiFetch(
      'https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events',
      {method:'POST',body:JSON.stringify(event)}
    );
    updateTask(task.id,{gcalEventId:created.id});
    showToast('📅 Googleカレンダーに登録しました');
    await fetchGcalEvents();
    if(ui.view==='home')renderContent();
  }catch(e){
    console.error('GCal create failed:',e);
    showToast('カレンダー登録に失敗しました','error');
  }
}
async function updateGcalEvent(task,company,project){
  if(!state.gcalConnected||!_gcalAccessToken||!task.gcalEventId)return;
  const calId=getTaskCalId(task);
  const event=buildGcalEventBody(task,company,project);
  try{
    await gcalApiFetch(
      'https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events/'+task.gcalEventId,
      {method:'PATCH',body:JSON.stringify(event)}
    );
    showToast('Googleカレンダーのイベントを更新しました');
    await fetchGcalEvents();
    if(ui.view==='home')renderContent();
  }catch(e){
    console.error('GCal update failed:',e);
  }
}

function buildCsvExport(){

    <button class="btn btn-ghost" onclick="exportTasksCsv()">全件出力</button>

  </div>`;
}
function updateCsvPreview(){
  const from=document.getElementById('m-csv-from')?.value;
  const to=document.getElementById('m-csv-to')?.value;
  const basis=document.getElementById('m-csv-basis')?.value||'created';
  const basisLabel={created:'作成日',startDate:'開始日',dueDate:'締切日',actionDate:'アクション日'}[basis];
  const count=filterTasksForCsv(getAllTasks(),from,to,basis).length;
  const el=document.getElementById('m-csv-preview');
  if(el)el.innerHTML='📋 対象: <b>'+count+'件</b>（'+basisLabel+'が '+esc(from||'---')+' 〜 '+esc(to||'---')+' のタスク）';
}
function filterTasksForCsv(all,from,to,basis){
  if(!from&&!to)return all;
  return all.filter(t=>{
    let d=basis==='created'?(t.created?localDateStr(new Date(t.created)):''):(t[basis]||'');
    if(!d)return false;
    if(from&&d<from)return false;
    if(to&&d>to)return false;
    return true;
  });
}
function exportTasksCsv(from,to,basis){
  let all=getAllTasks();
  if(from||to)all=filterTasksForCsv(all,from,to,basis);
  const todayStr=today();
  const headers=['企業','プロジェクト','タスク名','ステータス','優先度','開始日','締切日','アクション日','作成日','完了判定','経過日数','残日数','Todo総数','Todo完了数','Todo進捗率','メモ','GoogleドキュメントURL'];
  const statusMap={todo:'未着手',doing:'進行中',done:'完了'};
  const priMap={high:'高',med:'中',low:'低'};
  function diffDays(a,b){if(!a||!b)return '';return Math.round((new Date(b)-new Date(a))/(1000*60*60*24));}
  const rows=all.map(t=>{
    const todoTotal=(t.todos||[]).length;
    const todoDone=(t.todos||[]).filter(d=>d.done).length;
    const startD=t.startDate||(t.created?localDateStr(new Date(t.created)):'');
    const elapsed=startD?diffDays(startD,todayStr):'';
    const remaining=t.dueDate?diffDays(todayStr,t.dueDate):'';
    return [
      t.companyName,t.projectName,t.title,
      statusMap[t.status]||t.status,priMap[t.priority]||t.priority,
      t.startDate||'',t.dueDate||'',t.actionDate||'',
      t.created?localDateStr(new Date(t.created)):'',
      t.status==='done'?'完了':'未完了',
      elapsed,remaining,todoTotal,todoDone,
      todoTotal?Math.round(todoDone/todoTotal*100)+'%':'',
      (t.note||'').replace(/\n/g,' '),t.gdocUrl||''
    ];
  });
  const csvEsc=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
  const csv='\uFEFF'+[headers.map(csvEsc).join(','),...rows.map(r=>r.map(csvEsc).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='stride_tasks_'+todayStr+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(url);
  closeModal();
  showToast(`タスク${all.length}件をCSVでダウンロードしました`);
}
